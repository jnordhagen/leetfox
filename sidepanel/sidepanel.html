<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetFox</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
<div id="app">

  <!-- Global API key banner -->
  <div id="no-key-banner" class="banner error hidden">
    <span>Add your API key in</span>
    <a id="settings-link" href="#">Settings</a>
  </div>

  <!-- Header (shown during active session and summary) -->
  <div id="session-header" class="header hidden">
    <div class="header-title">
      <span class="logo">&#129418;</span>
    </div>
    <div class="header-actions">
      <button id="settings-btn" class="btn btn-icon btn-sm" title="Settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="end-session-btn" class="btn btn-danger btn-sm">End Session</button>
    </div>
  </div>

  <!-- State 1: Loading / No Problem -->
  <div id="state-loading" class="state active">
    <div class="spinner"></div>
    <div class="loading-message" id="loading-message">Open a LeetCode problem to begin</div>

    <!-- Manual entry fallback -->
    <div class="manual-entry" id="manual-entry">
      <div>
        <label for="manual-title">Problem title</label>
        <input id="manual-title" class="input" type="text" placeholder="e.g. Two Sum" />
      </div>
      <div>
        <label for="manual-difficulty">Difficulty</label>
        <select id="manual-difficulty" class="input">
          <option value="">Unknown</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
      </div>
      <div class="manual-entry-actions">
        <button id="retry-scrape-btn" class="btn btn-secondary">Retry</button>
        <button id="manual-start-btn" class="btn btn-primary" style="flex:1">Start with manual entry</button>
      </div>
    </div>
  </div>

  <!-- State 2: Problem Loaded, Not Started -->
  <div id="state-ready" class="state">
    <div class="ready-problem-info">
      <div class="ready-problem-title" id="ready-title"></div>
      <div class="problem-bar-meta">
        <span id="ready-difficulty-badge" class="difficulty-badge"></span>
      </div>
      <div class="ready-tags" id="ready-tags"></div>
    </div>
    <button id="start-session-btn" class="btn btn-primary">Start Session</button>
  </div>

  <!-- State 3: Active Chat Session -->
  <div id="state-chat" class="state">
    <!-- Pinned problem bar -->
    <div class="problem-bar">
      <div class="problem-bar-title" id="chat-problem-title"></div>
      <div class="problem-bar-meta">
        <span id="chat-difficulty-badge" class="difficulty-badge"></span>
        <div id="chat-tags"></div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea
          id="chat-input"
          placeholder="Type your thoughts… (Shift+Enter for newline)"
          rows="1"
        ></textarea>
        <button id="mic-btn" class="btn btn-icon" title="Voice input" aria-label="Voice input">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <button id="send-btn" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>

  <!-- State 4: Session Complete / Summary -->
  <div id="state-summary" class="state">

    <div class="summary-section">
      <div class="summary-section-title">Session Stats</div>
      <div class="summary-stats">
        <div class="stat">
          <div class="stat-value" id="summary-duration">—</div>
          <div class="stat-label">Duration</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="summary-hints">0</div>
          <div class="stat-label">Hints</div>
        </div>
      </div>
    </div>

    <div class="summary-section" id="summary-patterns-section">
      <div class="summary-section-title">Patterns</div>
      <div class="pattern-list" id="summary-patterns"></div>
    </div>

    <div class="summary-section">
      <div class="summary-section-title">Session Notes</div>
      <div class="summary-text" id="summary-notes">Generating summary…</div>
    </div>

    <div class="summary-section">
      <div class="summary-section-title">Score</div>
      <div id="summary-score" class="score-badge scoring">Scoring…</div>
    </div>

    <div class="summary-actions">
      <button id="log-notion-btn" class="btn btn-primary">Log to Notion</button>
      <div id="notion-log-status"></div>
      <button id="copy-session-btn" class="btn btn-secondary">Copy Session Data</button>
      <button id="new-session-btn" class="btn btn-secondary">Start New Session</button>
    </div>

  </div>

</div>
<script type="module" src="sidepanel.js"></script>
</body>
</html>
